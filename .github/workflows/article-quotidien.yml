name: Generation article quotidien

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  generer-article:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Supabase
        run: npm install @supabase/supabase-js

      - name: Debug variables
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node -e "console.log('URL:', process.env.SUPABASE_URL ? 'OUI' : 'NON')"
          node -e "console.log('KEY:', process.env.SUPABASE_KEY ? 'OUI' : 'NON')"
          node -e "console.log('ANTHROPIC:', process.env.ANTHROPIC_KEY ? 'OUI' : 'NON')"
          ls scripts/

      - name: Generer article
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generer-article.mjs
