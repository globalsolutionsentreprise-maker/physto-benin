name: Surveillance quotidienne du site

on:
  schedule:
    - cron: "0 7 * * *"   # Tous les jours à 7h00 (UTC)
  workflow_dispatch:        # Permet de lancer manuellement

jobs:
  verifier-site:
    runs-on: ubuntu-latest
    steps:
      - name: Verifier que le site repond (HTTP 200)
        id: check
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 https://physto-benin.vercel.app)
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Code HTTP recu : $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERREUR : Le site repond avec le code $STATUS au lieu de 200"
            exit 1
          fi
          echo "OK : Le site est operationnel (HTTP 200)"

      - name: Verifier les pages principales
        run: |
          for PAGE in "/" "/services" "/contact" "/blog"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 "https://physto-benin.vercel.app$PAGE")
            echo "Page $PAGE => HTTP $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "ERREUR sur la page $PAGE (code $STATUS)"
              exit 1
            fi
          done
          echo "Toutes les pages sont accessibles."

      - name: Creer une issue GitHub en cas d erreur
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toLocaleString('fr-FR', { timeZone: 'Africa/Porto-Novo' });
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 ALERTE SITE : physto-benin.vercel.app est EN PANNE (${date})`,
              body: `## Site hors ligne détecté\n\n**Date :** ${date}\n**URL :** https://physto-benin.vercel.app\n\n### Actions recommandées\n1. Vérifiez le tableau de bord Vercel : https://vercel.com/dashboard\n2. Vérifiez les variables d'environnement Supabase dans Vercel\n3. Consultez les logs de déploiement sur Vercel\n\n*Surveillance automatique PHYSTO Bénin*`,
              labels: ['bug', 'urgent']
            });
